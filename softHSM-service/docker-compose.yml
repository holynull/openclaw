version: "3.8"

services:
  softHSM-service:
    build: .
    container_name: wallet-softHSM-service
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=15m
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - SOFTHSM_MODULE=/usr/lib/softhsm/libsofthsm2.so
      - HSM_TOKEN_LABEL=wallet-custody
      - HSM_PIN=${HSM_PIN}
      - API_KEY_SALT=${API_KEY_SALT}
      - VALID_API_KEYS=${VALID_API_KEYS}
      - AUDIT_ENABLED=true
      - AUDIT_LOG_PATH=/var/log/softHSM-service/audit.log
      - LOG_LEVEL=info
    volumes:
      # 持久化 HSM token 存储
      - hsm-data:/var/lib/softhsm-wallet
      # 持久化审计日志
      - audit-logs:/var/log/softHSM-service
      # SoftHSM 配置
      - ./softhsm2.conf:/etc/softhsm2.conf:ro
    networks:
      - signing-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health/ready",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx 反向代理（用于 HTTPS）
  nginx:
    image: nginx:alpine
    container_name: softHSM-service-proxy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - softHSM-service
    networks:
      - signing-network

volumes:
  hsm-data:
    driver: local
  audit-logs:
    driver: local

networks:
  signing-network:
    driver: bridge
