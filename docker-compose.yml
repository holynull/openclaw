services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GPTSAPI_KEY: ${GPTSAPI_KEY}
      MAYNOR1024_KEY: ${MAYNOR1024_KEY}
      INFURA_KEY: ${INFURA_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      GPTSAPI_KEY: ${GPTSAPI_KEY}
      MAYNOR1024_KEY: ${MAYNOR1024_KEY}
      INFURA_KEY: ${INFURA_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

  ## Second OpenClaw instance (optional)
  ## To use: set OPENCLAW_ENABLE_SECOND_INSTANCE=true and configure the variables below
  openclaw-gateway-2:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    container_name: openclaw-gateway-2
    profiles:
      - second-instance
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN_2:-${OPENCLAW_GATEWAY_TOKEN:-}}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GPTSAPI_KEY: ${GPTSAPI_KEY}
      MAYNOR1024_KEY: ${MAYNOR1024_KEY}
      INFURA_KEY: ${INFURA_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN_2:-${TELEGRAM_BOT_TOKEN}}
      FEISHU_APP_ID: ${FEISHU_APP_ID_2:-${FEISHU_APP_ID}}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET_2:-${FEISHU_APP_SECRET}}
      SOFTHSM_API_KEY: ${SOFTHSM_API_KEY}
      SOFTHSM_API_SECRET: ${SOFTHSM_API_SECRET}
      SOFTHSM_SERVICE_URL: http://softhsm-service:3000
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR_2:-~/.openclaw2}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR_2:-~/.openclaw2/workspace}:/home/node/.openclaw/workspace
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT_2:-28789}:18789"
      - "${OPENCLAW_BRIDGE_PORT_2:-28790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli-2:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    container_name: openclaw-cli-2
    profiles:
      - second-instance
    network_mode: "service:openclaw-gateway-2"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN_2:-${OPENCLAW_GATEWAY_TOKEN:-}}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      GPTSAPI_KEY: ${GPTSAPI_KEY}
      MAYNOR1024_KEY: ${MAYNOR1024_KEY}
      INFURA_KEY: ${INFURA_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN_2:-${TELEGRAM_BOT_TOKEN}}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FEISHU_APP_ID: ${FEISHU_APP_ID_2:-${FEISHU_APP_ID}}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET_2:-${FEISHU_APP_SECRET}}
      SOFTHSM_API_KEY: ${SOFTHSM_API_KEY}
      SOFTHSM_API_SECRET: ${SOFTHSM_API_SECRET}
      SOFTHSM_SERVICE_URL: http://softhsm-service:3000
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR_2:-~/.openclaw2}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR_2:-~/.openclaw2/workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway-2

  softhsm-service:
    build:
      context: .
      dockerfile: Dockerfile.softHSM
    image: openclaw-softhsm:latest
    container_name: softhsm-service
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=15m
      - ALLOWED_ORIGINS=openclaw-gateway-2,${ALLOWED_ORIGINS:-*}
      - SOFTHSM_MODULE=/usr/lib/softhsm/libsofthsm2.so
      - HSM_TOKEN_LABEL=wallet-custody
      - HSM_PIN=${HSM_PIN}
      - API_KEY_SALT=${API_KEY_SALT}
      - VALID_API_KEYS=${VALID_API_KEYS}
      - API_KEY_PAIRS=${API_KEY_PAIRS}
      - AUDIT_ENABLED=true
      - AUDIT_LOG_PATH=/var/log/softHSM-service/audit.log
      - LOG_LEVEL=info
      # 助记词配置（首次初始化时自动生成）
      - HD_PATH_PREFIX=${HD_PATH_PREFIX:-m/44'/60'/0'/0}
      - MNEMONIC_BACKUP_PATH=/var/lib/softhsm-wallet/mnemonic-backup.txt
    volumes:
      # 持久化 HSM token 存储（包含助记词备份）
      - hsm-data:/var/lib/softhsm-wallet
      # 持久化审计日志
      - audit-logs:/var/log/softHSM-service
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health/ready",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  hsm-data:
    name: softhsm-data
  audit-logs:
    name: softhsm-logs
